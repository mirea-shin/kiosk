name: Release Kiosk

# v로 시작하는 태그(v1.0.0 등)를 push할 때만 실행
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      # 1. 코드 체크아웃
      - uses: actions/checkout@v4

      # 2. pnpm 설치
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      # 3. Node.js 설치 + pnpm 캐시 활성화
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # 4. 의존성 설치 (루트에서 전체 워크스페이스)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. 플랫폼에 맞는 설치 파일 빌드
      - name: Build kiosk package
        run: pnpm --filter @kiosk/kiosk package:${{ matrix.platform }}

      # 6. 빌드 결과물을 GitHub Release에 업로드
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/kiosk/release/**/*.{dmg,exe,AppImage}
          # 태그 메시지를 릴리즈 노트로 사용
          generate_release_notes: true
